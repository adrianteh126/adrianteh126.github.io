# File: .github/workflows/setup-node/action.yml
name: setup-node
description: Setup Node + PNPM

runs:
  using: "composite"
  steps:
    # 1️⃣ Install pnpm FIRST
    - name: Setup PNPM 📦
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    # 2️⃣ Setup Node and enable pnpm cache
    - name: Setup Node.js ⚙️
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "pnpm"

    # 3️⃣ Install dependencies
    - name: Install dependencies 🔧
      shell: bash
      run: pnpm install --frozen-lockfile
